{% extends 'clients/base.html' %}
{% block title %}Удаление клиента{% endblock %}
{% block content %}
<h1>Удалить клиента?</h1>
<p>Вы уверены, что хотите удалить <strong>"{{ client.full_name }}"</strong>?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Да, удалить</button>
    <a href="{% url 'client_list' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
